services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  orders-service:
    build: ./php-orders-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: orders_db
      DB_USER: orders_user
      DB_PASSWORD: orders_password
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  notification-service:
    build: ./go-notification-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: orders_db
      DB_USER: orders_user
      DB_PASSWORD: orders_password
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - orders-service
      - notification-service
    ports:
      - "5173:5173"

  gateway:
    build: ./gateway
    depends_on:
      - orders-service
      - notification-service
      - frontend
    ports:
      - "80:80"

volumes:
  pgdata:
