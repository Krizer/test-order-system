# Nginx как API Gateway: единая точка входа для фронтенда,
# которая маршрутизирует запросы к нужному микросервису по префиксу пути.
# Сами сервисы (PHP, Go) ничего не знают друг о друге — каждый общается
# только с Gateway или (в случае событий) друг с другом по внутренней сети.

upstream orders_service {
    server orders-service:8000;
}

upstream notification_service {
    server notification-service:8080;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;

    # Заказы -> PHP Orders Service
    location /api/orders {
        proxy_pass http://orders_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Нотификации -> Go Notification Service
    location /api/notifications {
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # Всё остальное -> React dev-сервер (включая HMR через WebSocket)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
